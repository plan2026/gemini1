<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار: كفاءة التخطيط الاستراتيجي | Strategic Planning Proficiency Quiz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(145deg, #1a3a5f 0%, #2c5f9e 50%, #4a90e2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 900px;
            padding: 40px;
            border: 1px solid #d4b483;
        }
        
        h1 {
            color: #1a3a5f;
            font-size: 30px;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .subtitle {
            color: #8b6b4d;
            text-align: center;
            margin-bottom: 25px;
            font-size: 18px;
            border-bottom: 2px solid #d4b483;
            padding-bottom: 20px;
            font-weight: 500;
        }
        
        .stats-bar {
            display: flex;
            justify-content: space-between;
            background: #f0f5fb;
            padding: 15px 25px;
            border-radius: 50px;
            margin-bottom: 30px;
            border: 1px solid #1a3a5f;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #1a3a5f;
            font-weight: 600;
        }
        
        .progress-container {
            width: 100%;
            height: 12px;
            background: #e0e7d8;
            border-radius: 20px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #1a3a5f, #4a90e2);
            width: 0%;
            transition: width 0.4s ease;
        }
        
        .question-card {
            background: #ffffff;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border-right: 6px solid #1a3a5f;
        }

        .question-text {
            font-size: 19px;
            color: #1a3a5f;
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .options-grid {
            display: grid;
            gap: 12px;
        }
        
        .option {
            background: #f8fafd;
            border: 2px solid #e1e8f0;
            border-radius: 15px;
            padding: 15px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        
        .option:hover {
            border-color: #1a3a5f;
            background: #edf4fc;
        }

        .option.correct {
            background: #d4edda;
            border-color: #28a745;
            color: #155724;
        }

        .option.incorrect {
            background: #f8d7da;
            border-color: #dc3545;
            color: #721c24;
        }

        .explanation-box {
            background: #fff9e6;
            border: 1px solid #ffeeba;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
        }

        .treatment-tag {
            display: inline-block;
            background: #1a3a5f;
            color: white;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 10px;
        }

        .btn-primary {
            background: #1a3a5f;
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            float: left;
        }

        .btn-primary:disabled {
            background: #ccc;
        }

        #results {
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 اختبار التميز الاستراتيجي</h1>
        <div class="subtitle">Strategic Planning & Policy Excellence Test</div>
        
        <div id="quiz-section">
            <div class="stats-bar">
                <div class="stat-item">السؤال: <span id="current-idx">1</span> / <span id="total-count">0</span></div>
                <div class="stat-item">النتيجة: <span id="score">0</span></div>
            </div>

            <div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>

            <div id="quiz-content"></div>

            <div style="overflow: auto; margin-top: 20px;">
                <button class="btn-primary" id="nextBtn" onclick="handleNext()" disabled>السؤال التالي ←</button>
            </div>
        </div>

        <div id="results">
            <h2 style="color: #1a3a5f; margin-bottom: 20px;">النتيجة النهائية</h2>
            <div style="font-size: 64px; font-weight: 800; color: #8b6b4d;" id="final-score">0</div>
            <p id="final-msg" style="margin: 20px 0; font-size: 18px;"></p>
            <button class="btn-primary" onclick="location.reload()" style="float: none;">إعادة الاختبار</button>
        </div>
    </div>

    <script>
        const questionBank = [
            {
                text: "كتبت إدارة التخطيط الخطة وحدها دون إشراك الإدارات الأخرى. ما النتيجة المتوقعة؟",
                options: ["ضعف التملك المؤسسي للخطة", "زيادة الابتكار", "زيادة التمويل", "تسريع التنفيذ"],
                correct: 0,
                explanation: "التخطيط التشاركي يزيد الالتزام بالتنفيذ.",
                characteristics: "مقاومة داخلية، ضعف الالتزام، ضعف التعاون.",
                treatment: "تنظيم ورش تخطيط تشاركية."
            },
            {
                text: "وضعت مؤسسة أهدافاً طموحة جداً دون تقييم الموارد المتاحة. ما المشكلة؟",
                options: ["غياب الواقعية في التخطيط", "زيادة الابتكار", "ضعف المشاركة", "ضعف المؤشرات"],
                correct: 0,
                explanation: "الاستراتيجية يجب أن توازن بين الطموح والموارد.",
                characteristics: "فجوة بين الطموح والقدرة، خطر الفشل.",
                treatment: "تحليل الموارد قبل اعتماد الأهداف."
            },
            {
                text: "ورد في الخطة هدف بعنوان (تحسين الخدمات الحكومية) دون مؤشر رقمي. ما الخلل؟",
                options: ["غياب قابلية القياس", "زيادة المرونة", "زيادة الابتكار", "زيادة التمويل"],
                correct: 0,
                explanation: "الأهداف يجب أن تكون قابلة للقياس عبر مؤشرات أداء.",
                characteristics: "أهداف عامة، صعوبة التقييم، ضعف المساءلة.",
                treatment: "تحويل الهدف إلى مؤشر رقمي واضح."
            },
            {
                text: "لم تتضمن الخطة أي تحليل للمخاطر المستقبلية. ما المشكلة؟",
                options: ["غياب إدارة المخاطر", "زيادة الطموح", "ضعف الموارد", "زيادة الابتكار"],
                correct: 0,
                explanation: "إدارة المخاطر تساعد المؤسسات على الاستعداد للتغيرات.",
                characteristics: "مفاجآت غير متوقعة، ضعف المرونة، جمود التخطيط.",
                treatment: "إدراج سجل للمخاطر الاستراتيجية."
            },
            {
                text: "لم يتم تحديد مسؤول عن تحقيق كل هدف في الخطة. ما المشكلة؟",
                options: ["غياب المساءلة", "زيادة الابتكار", "زيادة الموارد", "زيادة المرونة"],
                correct: 0,
                explanation: "كل هدف استراتيجي يجب أن يكون له مالك مسؤول (Owner).",
                characteristics: "غياب المسؤولية، ضعف المتابعة، تشتت التنفيذ.",
                treatment: "تحديد مسئول (Owner) لكل هدف."
            },
            {
                text: "اقترح فريق التخطيط نفس الحلول القديمة لمشكلة مزمنة. ما المبدأ غير المطبق؟",
                options: ["مبدأ الابتكار", "مبدأ القياس", "مبدأ المشاركة", "مبدأ الواقعية"],
                correct: 0,
                explanation: "التخطيط الحديث يتطلب حلولاً مبتكرة لكسر الجمود.",
                characteristics: "تكرار السياسات، ضعف الإبداع، تأثير محدود.",
                treatment: "تشجيع التفكير الابتكاري."
            },
            {
                text: "الأهداف المؤسسية لا تتوافق مع الأهداف القطاعية. ما المشكلة؟",
                options: ["ضعف المواءمة الاستراتيجية", "زيادة الابتكار", "زيادة الموارد", "زيادة الكفاءة"],
                correct: 0,
                explanation: "الخطط المؤسسية يجب أن تدعم الخطط القطاعية (Vertical Alignment).",
                characteristics: "تضارب السياسات، هدر الموارد، ضعف التنسيق.",
                treatment: "مواءمة الأهداف مع الاستراتيجية القطاعية."
            },
            {
                text: "لم يقم الفريق بتحليل الوضع الحالي قبل كتابة الخطة. ما الخطأ؟",
                options: ["غياب التشخيص الاستراتيجي", "زيادة الابتكار", "زيادة التمويل", "زيادة المرونة"],
                correct: 0,
                explanation: "لا يمكن التخطيط للمستقبل دون فهم الوضع الحالي (AS-IS).",
                characteristics: "ضعف التحليل، أهداف غير دقيقة، سوء تقدير التحديات.",
                treatment: "إجراء تحليل بيئي شامل (SWOT/PESTEL)."
            },
            {
                text: "استخدمت المؤسسة بيانات عمرها خمس سنوات في التحليل. ما الخطر؟",
                options: ["تحليل غير دقيق للوضع الحالي", "زيادة الابتكار", "زيادة التمويل", "زيادة الكفاءة"],
                correct: 0,
                explanation: "البيانات القديمة لا تعكس الواقع المتغير.",
                characteristics: "فجوة معلوماتية، قرارات غير دقيقة، ضعف التوقعات.",
                treatment: "تحديث قواعد البيانات دورياً."
            },
            {
                text: "لم تتم مراجعة الخطة رغم تغير الظروف الاقتصادية العالمية. ما المشكلة؟",
                options: ["غياب المرونة الاستراتيجية", "زيادة الاستقرار", "زيادة الابتكار", "زيادة الموارد"],
                correct: 0,
                explanation: "الاستراتيجيات يجب أن تكون مرنة وقابلة للتكيف (Agility).",
                characteristics: "جمود التخطيط، تأخر الاستجابة، خطر الفشل.",
                treatment: "إجراء مراجعات دورية ربع سنوية."
            }
        ];

        let currentIdx = 0;
        let score = 0;
        let answered = false;

        document.getElementById('total-count').innerText = questionBank.length;

        function loadQuestion() {
            answered = false;
            document.getElementById('nextBtn').disabled = true;
            const q = questionBank[currentIdx];
            let html = `
                <div class="question-card">
                    <div class="question-text">${q.text}</div>
                    <div class="options-grid">
                        ${q.options.map((opt, i) => `
                            <div class="option" onclick="checkAnswer(${i}, this)">${opt}</div>
                        `).join('')}
                    </div>
                    <div class="explanation-box" id="exp">
                        <strong>التفسير:</strong> ${q.explanation}<br>
                        <small>الخصائص: ${q.characteristics}</small><br>
                        <span class="treatment-tag">العلاج: ${q.treatment}</span>
                    </div>
                </div>
            `;
            document.getElementById('quiz-content').innerHTML = html;
            document.getElementById('current-idx').innerText = currentIdx + 1;
            document.getElementById('progress').style.width = ((currentIdx + 1) / questionBank.length * 100) + '%';
        }

        function checkAnswer(idx, el) {
            if (answered) return;
            answered = true;
            const q = questionBank[currentIdx];
            const options = document.querySelectorAll('.option');
            
            if (idx === q.correct) {
                el.classList.add('correct');
                score++;
                document.getElementById('score').innerText = score;
            } else {
                el.classList.add('incorrect');
                options[q.correct].classList.add('correct');
            }
            
            document.getElementById('exp').style.display = 'block';
            document.getElementById('nextBtn').disabled = false;
        }

        function handleNext() {
            currentIdx++;
            if (currentIdx < questionBank.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            document.getElementById('final-score').innerText = score + " / " + questionBank.length;
            
            let msg = score > (questionBank.length/2) ? "أداء استراتيجي ممتاز! لديك وعي عالٍ بمفاهيم التخطيط." : "تحتاج إلى مراجعة بعض مفاهيم المواءمة وإدارة الأداء.";
            document.getElementById('final-msg').innerText = msg;
        }

        loadQuestion();
    </script>
</body>
</html>
